<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="task-card">
      <div class="progress-section">
        <div class="heading-row">
          <div>
            <p class="eyebrow">Task Progress</p>
            <h1>My Task Manager</h1>
          </div>
          <p class="progress-label" id="progressLabel">0% Complete</p>
        </div>

        <div
          class="progress task-progress"
          role="progressbar"
          aria-label="Task completion progress"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <section class="task-entry">
        <h2>Add a Task</h2>
        <div class="task-form">
          <input
            type="text"
            id="taskInput"
            class="form-control"
            placeholder="Enter a new task"
            maxlength="100"
          >
          <button id="addTaskButton" class="btn btn-primary">Add Task</button>
        </div>
      </section>

      <section class="task-list-section">
        <div class="task-list-header">
          <h2>Tasks</h2>
          <p id="taskSummary">0 of 0 completed</p>
        </div>
        <ul id="taskList" class="task-list"></ul>
        <p id="emptyState" class="empty-state">Add your first task to get started.</p>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
